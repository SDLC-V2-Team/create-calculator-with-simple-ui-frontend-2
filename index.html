<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Scientific Calculator</h1>
      <p class="hint">
        Enter values, then click an operation. Unary operations use only the
        first input.
      </p>
      <div class="inputs">
        <label>A <input id="argA" type="number" value="0" /></label>
        <label>B <input id="argB" type="number" value="0" /></label>
      </div>
      <div id="operations" class="operations"></div>
      <div id="result" class="result">Result: —</div>
    </main>
    <script type="module" src="/src/web/main.ts"></script>
  </body>
</html>
