<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Calculator</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --panel: #2a2a3c;
      --display: #11111b;
      --btn: #45475a;
      --btn-hover: #585b70;
      --op: #f9a825;
      --op-hover: #ffb74d;
      --eq: #4caf50;
      --eq-hover: #66bb6a;
      --clear: #e53935;
      --clear-hover: #ef5350;
      --text: #cdd6f4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .calculator {
      width: 320px;
      background: var(--panel);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 12px;
      text-align: center;
      opacity: 0.8;
    }
    .display {
      background: var(--display);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: right;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }
    .display .expression {
      font-size: 14px;
      opacity: 0.6;
      min-height: 18px;
      word-break: break-all;
    }
    .display .result {
      font-size: 32px;
      font-weight: 700;
      word-break: break-all;
    }
    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 18px 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      background: var(--btn);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
    }
    button:hover { background: var(--btn-hover); }
    button:active { transform: scale(0.96); }
    button.op { background: var(--op); color: #1e1e2e; }
    button.op:hover { background: var(--op-hover); }
    button.equals { background: var(--eq); color: #1e1e2e; }
    button.equals:hover { background: var(--eq-hover); }
    button.clear { background: var(--clear); }
    button.clear:hover { background: var(--clear-hover); }
    button.span-2 { grid-column: span 2; }
  </style>
</head>
<body>
  <main class="calculator" role="application" aria-label="Calculator">
    <h1>Simple Calculator</h1>
    <div class="display">
      <div class="expression" id="expression" aria-live="polite"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="keys">
      <button class="clear" data-action="clear">AC</button>
      <button data-action="backspace">&larr;</button>
      <button class="op" data-value="%">%</button>
      <button class="op" data-value="/">&divide;</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="op" data-value="*">&times;</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="op" data-value="-">&minus;</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="op" data-value="+">+</button>

      <button class="span-2" data-value="0">0</button>
      <button data-value=".">.</button>
      <button class="equals" data-action="equals">=</button>
    </div>
  </main>

  <script>
    /**
     * Safe arithmetic evaluator.
     *
     * Per ADR-001 we deliberately AVOID eval(). Instead we implement a small
     * tokenizer + recursive-descent parser that supports + - * / % and
     * parentheses with correct operator precedence.
     */

    // ---- Tokenizer -------------------------------------------------------
    function tokenize(input) {
      const tokens = [];
      let i = 0;
      while (i < input.length) {
        const ch = input[i];
        if (ch === ' ') { i++; continue; }
        if ('+-*/%()'.includes(ch)) {
          tokens.push({ type: 'op', value: ch });
          i++;
          continue;
        }
        if ((ch >= '0' && ch <= '9') || ch === '.') {
          let num = '';
          let dotCount = 0;
          while (i < input.length && ((input[i] >= '0' && input[i] <= '9') || input[i] === '.')) {
            if (input[i] === '.') dotCount++;
            if (dotCount > 1) throw new Error('Invalid number');
            num += input[i];
            i++;
          }
          tokens.push({ type: 'num', value: parseFloat(num) });
          continue;
        }
        throw new Error('Unexpected character: ' + ch);
      }
      return tokens;
    }

    // ---- Parser (recursive descent) --------------------------------------
    function parse(tokens) {
      let pos = 0;
      const peek = () => tokens[pos];
      const next = () => tokens[pos++];

      // expression := term (('+' | '-') term)*
      function expression() {
        let left = term();
        while (peek() && peek().type === 'op' && (peek().value === '+' || peek().value === '-')) {
          const op = next().value;
          const right = term();
          left = op === '+' ? left + right : left - right;
        }
        return left;
      }

      // term := factor (('*' | '/' | '%') factor)*
      function term() {
        let left = factor();
        while (peek() && peek().type === 'op' && (peek().value === '*' || peek().value === '/' || peek().value === '%')) {
          const op = next().value;
          const right = factor();
          if (op === '*') left = left * right;
          else if (op === '/') {
            if (right === 0) throw new Error('Division by zero');
            left = left / right;
          } else {
            if (right === 0) throw new Error('Modulo by zero');
            left = left % right;
          }
        }
        return left;
      }

      // factor := number | '(' expression ')' | ('+' | '-') factor
      function factor() {
        const t = peek();
        if (!t) throw new Error('Unexpected end of input');
        if (t.type === 'num') { next(); return t.value; }
        if (t.type === 'op' && t.value === '(') {
          next();
          const val = expression();
          if (!peek() || peek().value !== ')') throw new Error('Missing closing parenthesis');
          next();
          return val;
        }
        if (t.type === 'op' && (t.value === '+' || t.value === '-')) {
          next();
          const val = factor();
          return t.value === '-' ? -val : val;
        }
        throw new Error('Unexpected token: ' + t.value);
      }

      const result = expression();
      if (pos < tokens.length) throw new Error('Unexpected trailing input');
      return result;
    }

    /** Public API: safely evaluate an arithmetic expression string. */
    function evaluate(expr) {
      const tokens = tokenize(expr);
      if (tokens.length === 0) return 0;
      const value = parse(tokens);
      // Clean up floating point noise.
      return Math.round((value + Number.EPSILON) * 1e10) / 1e10;
    }

    // ---- UI wiring -------------------------------------------------------
    const expressionEl = document.getElementById('expression');
    const resultEl = document.getElementById('result');
    let current = '';

    function render(resultText) {
      expressionEl.textContent = current || '';
      resultEl.textContent = resultText !== undefined ? resultText : (current || '0');
    }

    function append(value) {
      current += value;
      render();
    }

    function clearAll() {
      current = '';
      render('0');
    }

    function backspace() {
      current = current.slice(0, -1);
      render();
    }

    function compute() {
      try {
        const value = evaluate(current);
        expressionEl.textContent = current + ' =';
        resultEl.textContent = String(value);
        current = String(value);
      } catch (err) {
        resultEl.textContent = 'Error';
      }
    }

    document.querySelector('.keys').addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const action = btn.dataset.action;
      const value = btn.dataset.value;
      if (action === 'clear') return clearAll();
      if (action === 'backspace') return backspace();
      if (action === 'equals') return compute();
      if (value !== undefined) append(value);
    });

    // Keyboard support.
    document.addEventListener('keydown', (e) => {
      const key = e.key;
      if ((key >= '0' && key <= '9') || '+-*/%.()'.includes(key)) {
        append(key);
      } else if (key === 'Enter' || key === '=') {
        e.preventDefault();
        compute();
      } else if (key === 'Backspace') {
        backspace();
      } else if (key === 'Escape') {
        clearAll();
      }
    });

    render('0');

    // Expose evaluator for potential testing / debugging.
    window.Calculator = { evaluate, tokenize };
  </script>
</body>
</html>
